name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - run: bun run check
      - run: docker build --tag flag-quiz:ci .
      - name: Smoke-test container
        run: |
          docker run --detach --name flag-quiz-ci --publish 127.0.0.1:18080:3000 flag-quiz:ci
          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:18080/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs flag-quiz-ci
          exit 1
      - if: always()
        run: docker rm --force flag-quiz-ci || true
